version: "3.9"

services:
  app:
    build:
      context: ./backend
    container_name: ctulhuchat_app
    ports:
      - "8081:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: ctulhuchat_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ctulhuchat
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ctulhu
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: